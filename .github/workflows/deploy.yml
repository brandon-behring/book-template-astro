name: Deploy

# Triggers:
#   push to main         → deploys to root production URL
#   push to v*           → deploys as a preview URL (preserved version snapshot)
#   workflow_dispatch    → manual trigger from the Actions tab
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — Pages:Edit permission
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account id
#
# Cloudflare setup (one-time, before the first push):
#   1. Create a Cloudflare Pages project named `book-template-astro`
#      (direct-upload / "Connect to Git" — either is fine; we push via API).
#   2. In Cloudflare dashboard → My Profile → API Tokens, create a token
#      with the "Edit Cloudflare Pages" template. Copy the token.
#   3. Your account id is visible on the right side of any Cloudflare
#      dashboard page ("Account ID").
#   4. Add both values as GitHub repo secrets (names above).
#
# After setup, every push to main (or a v* branch) redeploys the book.

on:
  push:
    branches:
      - main
      - 'v[0-9]*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro + Pagefind)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=book-template-astro --branch=${{ github.ref_name }}
